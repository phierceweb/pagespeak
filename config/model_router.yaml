# Per-agent model + sampling config for pagespeak's LLM-calling tasks.
#
# Read by pf-core's model router (`pf_core.llm.router`); pagespeak's
# `_agent_runtime` seam points the router here (the copy bundled in the
# wheel is the fallback). Nested schema â€” each task declares a model per
# backend:
#
#   agents:
#     <agent_slug>:
#       backends:
#         claude_code:
#           model: <claude-code-flavored model name>
#         anthropic:
#           model: <anthropic-API model name>
#         openrouter:
#           model: <openrouter slash-namespaced model name>
#       # Optional shared sampling kwargs (apply to whichever backend
#       # is picked):
#       # temperature: 0.0
#       # max_tokens: 4000
#
# Backend precedence: per-call `backend=` kwarg > `PAGESPEAK_<SLUG>_BACKEND`
# env var (enabled by `env_prefix`) > top-level `default_client`. An env
# value naming an undeclared backend falls through to the default.
#
# Model precedence: per-call override (`to_markdown(vision_model=â€¦)` /
# CLI `--<task>-model`) > the active backend's `model` entry.
#
# `non_chat_keys` names YAML keys that are pagespeak-side options, not
# client.chat() kwargs â€” the router strips them from resolved configs;
# read them via `pagespeak._agent_runtime.agent_option`.
#
# Override the YAML path with `MODEL_ROUTER_CONFIG=path/to/file.yaml`.
# Edits hot-reload within MODEL_ROUTER_RELOAD_SECONDS (default 60).

env_prefix: PAGESPEAK
default_client: claude_code
non_chat_keys: [max_input_tokens]

agents:
  vision:
    # Vision pass â€” per-image diagram classification + caption + mermaid.
    # Native multimodal required.
    backends:
      claude_code:
        # `haiku` short alias resolves to whatever the local Claude CLI
        # session has access to (typically the latest pinned Haiku).
        model: haiku
        # claude --print uses session-default max output; no kwarg needed.
      anthropic:
        model: claude-haiku-4-5-20251001
        max_tokens: 2048
        # Anthropic's strict mode for Haiku 4.5 rejects sending both
        # `temperature` AND `top_p`. Keep `temperature` (set per-call /
        # via pf-core default 0.2), drop `top_p` (set null â†’ pf-core's
        # conditional-include omits it from the API body).
        top_p: null
      openrouter:
        # Gemini 2.5 Flash â€” 1M context, native multimodal,
        # ~10Ă— cheaper than Haiku via Anthropic API for the same task.
        model: google/gemini-2.5-flash
        max_tokens: 2048

  heading_normalize:
    # `llm` mode â€” filtered structural-heading list (numbered prefixes
    # only). Tiny payload, haiku is plenty.
    #
    # One `<idx>: <level>` line per heading, so the output budget scales
    # with heading count (a large textbook â‰ˆ 1750 headings â‰ˆ 4400 tokens).
    # 8000 leaves headroom; claude_code ignores this kwarg.
    backends:
      claude_code:
        # `haiku` short alias â€” resolved by the local CLI to the latest
        # Haiku your session has access to.
        model: sonnet
      anthropic:
        model: claude-sonnet-4-6
        max_tokens: 8000
      openrouter:
        model: google/gemini-2.5-flash
        max_tokens: 8000

  heading_normalize_full:
    # `llm_full` mode â€” all headings + body-context anchors. The
    # reasoning-heavy task: inferring parent-child relationships from prose
    # when headings are unnumbered. Sonnet fits Anthropic-family backends;
    # Haiku struggles on the tricky unnumbered-heading cases.
    #
    # `max_input_tokens` is pagespeak's payload-shaping gate (NOT a client
    # kwarg). When charsĂ·4 of the headings+anchors prompt exceeds it, gather
    # drops body anchors and re-sends headings only. Set per-backend to
    # match each backend's context window. `max_tokens` is the output cap.
    backends:
      claude_code:
        # `opus` short alias â€” resolves to whatever Opus the local CLI
        # session has access to. Best reasoning available, $0 under an
        # active Max subscription. Swap to `sonnet` for faster/cheaper.
        model: opus
        # Opus/Sonnet via the CLI support 1M extended context. 800K
        # leaves headroom so body anchors go through on textbook-scale
        # docs (~350K). Drop to 150K if you want forced fallback to
        # headings-only mode.
        max_input_tokens: 800000
      anthropic:
        # Direct Anthropic API. Opus 4.8 is a reasoning model that
        # rejects `temperature` and `top_p` â€” set both to null to
        # opt out (pf-core's AnthropicClient drops `None` kwargs from
        # the API call body). Swap model to `claude-sonnet-4-6` (or
        # similar non-reasoning model) and the temperature/top_p
        # opt-out can stay or be removed; both are accepted there.
        model: claude-opus-4-8
        #model: claude-sonnet-4-6
        max_tokens: 8000
        max_input_tokens: 150000
        temperature: null
        top_p: null
      openrouter:
        # Gemini 2.5 for the 1M window â€” keeps body anchors through for
        # textbook-scale docs without the gate firing.
        #model: google/gemini-2.5-pro
        model: anthropic/claude-opus-4.8
        max_tokens: 16000
        max_input_tokens: 900000
