<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}pagespeak console{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="/static/app.css"/>
</head>
<body class="bg-slate-50 text-slate-800">
  <header class="border-b bg-white">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-4">
      <a href="/" class="font-semibold text-slate-900">pagespeak console</a>
      <nav class="text-sm text-slate-500 flex gap-4">
        <a href="/" class="hover:text-slate-900">Conversions</a>
        <a href="/admin/llm/" class="hover:text-slate-900">LLM admin</a>
        <a href="/help" class="hover:text-slate-900">Help</a>
      </nav>
      <span class="ml-auto text-xs text-slate-400">v{{ app_version }}</span>
    </div>
  </header>
  <main class="max-w-6xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
